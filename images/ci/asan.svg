<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 아산시 CI: 파란 산봉우리/피크 M자 형태 -->
  <circle cx="50" cy="50" r="45" fill="white"/>
  <!-- 왼쪽 산봉우리 -->
  <path d="M10,75 L30,35 L50,55 L70,25 L90,75 Z" fill="none" stroke="#0055aa" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 채움 그라데이션 효과 -->
  <path d="M10,75 L30,35 L50,55 L70,25 L90,75 Z" fill="#0055aa" opacity="0.1"/>
  <!-- 오른쪽 상단 피크 강조 -->
  <circle cx="70" cy="25" r="5" fill="#0077cc"/>
  <!-- 하단 라인 -->
  <line x1="10" y1="75" x2="90" y2="75" stroke="#0055aa" stroke-width="4" opacity="0.5"/>
</svg>
