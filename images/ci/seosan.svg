<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 서산시 CI: 빨강+파랑 추상 S자 형태 -->
  <circle cx="50" cy="50" r="45" fill="white"/>
  <!-- 상단 빨간 곡선 -->
  <path d="M25,30 Q50,15 75,30 Q85,38 75,50 L50,50" fill="none" stroke="#cc2200" stroke-width="10" stroke-linecap="round"/>
  <!-- 하단 파란 곡선 -->
  <path d="M75,70 Q50,85 25,70 Q15,62 25,50 L50,50" fill="none" stroke="#0055bb" stroke-width="10" stroke-linecap="round"/>
  <!-- 중앙 연결점 -->
  <circle cx="50" cy="50" r="5" fill="#7700aa"/>
</svg>
